<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業経営理論 過去問ダッシュボード</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;--checked:#3fb950;--lv1:#58a6ff;--lv2:#f0883e;--radius:8px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  header h1{font-size:1.1rem;font-weight:700;white-space:nowrap;}
  .header-stats{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap;}
  .stat-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.75rem;color:var(--text-muted);}
  .stat-badge span{color:var(--text);font-weight:700;}
  .controls{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .filter-label{font-size:.75rem;color:var(--text-muted);white-space:nowrap;}
  .filter-group{display:flex;gap:6px;align-items:center;}
  select,.btn-filter{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;font-size:.8rem;cursor:pointer;}
  select:focus{outline:none;border-color:var(--accent);}
  .btn-filter{transition:all .15s;}
  .btn-filter:hover{border-color:var(--accent);}
  .btn-filter.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-filter.active-lv2{background:var(--lv2);border-color:var(--lv2);color:#fff;}
  .search-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;font-size:.8rem;width:160px;}
  .search-box:focus{outline:none;border-color:var(--accent);}
  main{padding:16px 20px;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;}
  .stat-card-label{font-size:.72rem;color:var(--text-muted);margin-bottom:4px;}
  .stat-card-value{font-size:1.4rem;font-weight:700;}
  .stat-card-value.accent{color:var(--accent);}
  .stat-card-value.green{color:var(--checked);}
  .progress-wrap{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .progress-bar{height:6px;background:var(--surface2);border-radius:3px;flex:1;overflow:hidden;}
  .progress-fill{height:100%;background:var(--checked);border-radius:3px;transition:width .3s;}
  .progress-label{font-size:.75rem;color:var(--text-muted);white-space:nowrap;}
  .sheet-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
  .sheet-tab{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:.75rem;cursor:pointer;transition:all .15s;color:var(--text-muted);}
  .sheet-tab:hover{border-color:var(--accent);color:var(--text);}
  .sheet-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  .tab-count{font-size:.7rem;opacity:.8;margin-left:4px;}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .section-title{font-size:1rem;font-weight:700;}
  .section-sub{font-size:.8rem;color:var(--text-muted);}
  .topic-group{margin-bottom:20px;}
  .topic-title{font-size:.8rem;font-weight:700;color:var(--accent);padding:6px 10px;background:rgba(88,166,255,.08);border-left:3px solid var(--accent);border-radius:0 4px 4px 0;margin-bottom:8px;}
  .q-table{width:100%;border-collapse:collapse;font-size:.82rem;}
  .q-table th{background:var(--surface2);border-bottom:2px solid var(--border);padding:8px 10px;text-align:left;color:var(--text-muted);font-weight:600;font-size:.75rem;white-space:nowrap;}
  .q-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .q-table tr:hover td{background:rgba(88,166,255,.04);}
  .q-table tr.checked-row td{background:rgba(63,185,80,.05);}
  .badge-level{display:inline-block;border-radius:4px;padding:2px 7px;font-size:.7rem;font-weight:700;white-space:nowrap;}
  .badge-lv1{background:rgba(88,166,255,.15);color:var(--lv1);border:1px solid rgba(88,166,255,.3);}
  .badge-lv2{background:rgba(240,136,62,.15);color:var(--lv2);border:1px solid rgba(240,136,62,.3);}
  .badge-year{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.72rem;color:var(--text-muted);font-weight:600;}
  .badge-answer{display:inline-block;background:rgba(88,166,255,.2);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:.85rem;font-weight:700;min-width:30px;text-align:center;}
  .answer-select{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:3px 6px;font-size:.8rem;cursor:pointer;width:52px;}
  .answer-select.correct{border-color:var(--checked);color:var(--checked);}
  .answer-select.wrong{border-color:#f85149;color:#f85149;}
  .check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;flex-shrink:0;}
  .check-btn.checked{background:var(--checked);border-color:var(--checked);color:#fff;}
  .link-btn{display:inline-flex;align-items:center;gap:4px;color:var(--accent);text-decoration:none;font-size:.75rem;padding:2px 6px;border-radius:4px;border:1px solid rgba(88,166,255,.3);transition:all .15s;white-space:nowrap;}
  .link-btn:hover{background:rgba(88,166,255,.1);}
  .link-btn.disabled{color:var(--text-muted);border-color:var(--border);pointer-events:none;}
  .page-num{font-size:.75rem;color:var(--text-muted);}
  .no-results{text-align:center;color:var(--text-muted);padding:40px;font-size:.9rem;}
  .btn-danger{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.3);color:#f85149;border-radius:6px;padding:5px 12px;font-size:.8rem;cursor:pointer;}
  .btn-danger:hover{background:rgba(248,81,73,.25);}
  @media(max-width:700px){header h1{font-size:.9rem}.controls{gap:6px}.q-table{font-size:.75rem}main{padding:10px}}
</style>
</head>
<body>
<header>
  <h1>📚 企業経営理論 過去問ダッシュボード</h1>
  <div class="header-stats">
    <div class="stat-badge">総問数 <span id="total-count">0</span></div>
    <div class="stat-badge">習得済 <span id="checked-count">0</span></div>
    <div class="stat-badge">正答記録 <span id="answered-count">0</span></div>
  </div>
</header>
<div class="controls">
  <div class="filter-group"><span class="filter-label">年度</span><select id="filter-year"><option value="">全年度</option></select></div>
  <div class="filter-group"><span class="filter-label">レベル</span>
    <button class="btn-filter active" data-level="">全て</button>
    <button class="btn-filter" data-level="レベル1">Lv1</button>
    <button class="btn-filter" data-level="レベル2">Lv2</button>
  </div>
  <div class="filter-group"><span class="filter-label">状態</span>
    <button class="btn-filter active" data-status="">全て</button>
    <button class="btn-filter" data-status="unchecked">未習得</button>
    <button class="btn-filter" data-status="checked">習得済</button>
  </div>
  <input type="text" class="search-box" id="search-box" placeholder="トピック・問番号検索">
  <button class="btn-danger" id="reset-btn" style="margin-left:auto">リセット</button>
</div>
<main>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="progress-wrap">
    <span class="progress-label">習得進捗</span>
    <div class="progress-bar"><div class="progress-fill" id="main-progress" style="width:0%"></div></div>
    <span class="progress-label" id="progress-label">0 / 0</span>
  </div>
  <div class="sheet-nav" id="sheet-nav"></div>
  <div id="content-area"></div>
</main>

const allS=sheet.items,chkS=allS.filter(i=>state.checked[iid(i)]).length,pct=allS.length?Math.round(chkS/allS.length*100):0;
html+='<div class="section-header"><div><div class="section-title">'+sheet.title+'</div><div class="section-sub">'+chkS+'/'+allS.length+' 習得済 ('+pct+'%)</div></div></div>';
Object.entries(tm).forEach(([topic,items])=>{html+='<div class="topic-group"><div class="topic-title">📌 '+topic+'</div><table class="q-table"><thead><tr><th style="width:30px">✓</th><th style="width:90px">年度</th><th>問番号</th><th style="width:80px">レベル</th><th style="width:50px">正答</th><th style="width:70px">自答</th><th style="width:40px">P.</th><th>解説</th></tr></thead><tbody>';
items.forEach(item=>{const id=iid(item),chk=!!state.checked[id],ua=state.answers[id]||'',ok=ua&&ua===item.answer,ng=ua&&ua!==item.answer;
const chkCls='check-btn'+(chk?' checked':'');
const selCls='answer-select'+(ok?' correct':ng?' wrong':'');
const opts=['ア','イ','ウ','エ','オ'].map(c=>'<option value="'+c+'"'+(ua===c?' selected':'')+'>'+c+'</option>').join('');
html+='<tr class="'+(chk?'checked-row':'')+'" data-id="'+id+'">'+
'<td><button class="'+chkCls+'" onclick="toggleCheck(''+id+'')">✓</button></td>'+
'<td><span class="badge-year">'+item.year+'</span></td>'+
'<td style="font-weight:600">'+item.question_label+'</td>'+
'<td><span class="badge-level '+(item.level==='レベル1'?'badge-lv1':'badge-lv2')+'">'+item.level+'</span></td>'+
'<td><span class="badge-answer">'+item.answer+'</span></td>'+
'<td><select class="'+selCls+'" onchange="recordAnswer(''+id+'',''+item.answer+'',this.value)"><option value="">-</option>'+opts+'</select></td>'+
'<td><span class="page-num">'+(item.page||'–')+'</span></td>'+
'<td>'+(item.explanation_url?'<a href="'+item.explanation_url+'" target="_blank" class="link-btn">解説 →</a>':'<span class="link-btn disabled">–</span>')+'</td></tr>';
});html+='</tbody></table></div>';
});
});
if(!total)html='<div class="no-results">条件に合う問題がありません</div>';area.innerHTML=html;}
function renderAll(){renderSheetTabs();renderStats();renderContent();updateHeader();}
window.toggleCheck=function(id){state.checked[id]=!state.checked[id];saveState();renderAll();};
window.recordAnswer=function(id,corr,val){if(val)state.answers[id]=val;else delete state.answers[id];saveState();const sel=document.querySelector('tr[data-id="'+id+'"] .answer-select');if(sel)sel.className='answer-select'+(val&&val===corr?' correct':val&&val!==corr?' wrong':'');updateHeader();renderStats();};
document.getElementById('filter-year').addEventListener('change',e=>{state.filterYear=e.target.value;renderAll();});
document.getElementById('search-box').addEventListener('input',e=>{state.searchQuery=e.target.value;renderAll();});
document.querySelectorAll('.btn-filter[data-level]').forEach(btn=>{btn.addEventListener('click',()=>{state.filterLevel=btn.dataset.level;document.querySelectorAll('.btn-filter[data-level]').forEach(b=>{b.className='btn-filter'+(b.dataset.level===state.filterLevel?(b.dataset.level==='レベル2'?' active-lv2':' active'):'');});renderAll();});});
document.querySelectorAll('.btn-filter[data-status]').forEach(btn=>{btn.addEventListener('click',()=>{state.filterStatus=btn.dataset.status;document.querySelectorAll('.btn-filter[data-status]').forEach(b=>{b.className='btn-filter'+(b.dataset.status===state.filterStatus?' active':'');});renderAll();});});
document.getElementById('reset-btn').addEventListener('click',()=>{if(confirm('全ての習得チェックと自答記録をリセットしますか？')){state.checked={};state.answers={};saveState();renderAll();}});
renderYearSelect();renderAll();
</script>
</body>
</html>
